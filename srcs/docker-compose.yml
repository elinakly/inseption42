services:
  nginx:
    build: ./req/nginx
    image: nginx
    ports:
      - "443:443"
    restart: always
    networks:
      - inseption_network
    volumes:
      - wordpress_data:/var/www/html

  mariadb:
    build: ./req/mariadb
    image: mariadb
    restart: always
    networks:
      - inseption_network
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
    volumes:
      - mariadb_data:/var/lib/mysql
    secrets:
      - db_root_password
      - db_password

  wordpress:
    build: ./req/wordpress
    image: wordpress
    restart: always
    networks:
      - inseption_network
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}
      WP_DB_HOST: mariadb
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      WP_ADMIN_USER: ${WP_ADMIN_USER}
      WP_ADMIN_EMAIL: ${WP_ADMIN_EMAIL}
      WP_USER: ${WP_USER}
      WP_USER_EMAIL: ${WP_USER_EMAIL}
    volumes:
      - wordpress_data:/var/www/html
    secrets:
      - db_password
      - wp_user_password
      - wp_admin_password

secrets:
  wp_user_password:
    file: ./secrets/wp_user_password.txt
  wp_admin_password:
    file: ./secrets/wp_admin_password.txt
  db_password:
    file: ./secrets/db_password.txt
  db_root_password:
    file: ./secrets/db_root_password.txt
  

volumes:
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      device: ${HOME}/data/mariadb
      o: bind

  wordpress_data:
    driver: local
    driver_opts:
      type: none
      device: ${HOME}/data/wordpress
      o: bind

networks:
  inseption_network:
    driver: bridge